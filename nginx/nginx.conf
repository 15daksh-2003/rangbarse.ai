server {
    listen 80;
    server_name _;

    # Serve Vite build output (SPA)
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to Node.js Express proxy
    location /api/ {
        proxy_pass http://node-proxy:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Cache static assets aggressively (Vite hashed filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types
        text/html
        text/css
        application/javascript
        application/json
        image/png
        image/svg+xml;

    # Allow large base64 image uploads (game canvas → AI generation)
    client_max_body_size 15m;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;

    # Logging to stdout/stderr (Docker best practice)
    access_log /dev/stdout;
    error_log /dev/stderr;
}
